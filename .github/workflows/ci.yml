name: AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests and Capture Logs
      run: |
        mkdir -p logs
        echo "===== TEST EXECUTION START =====" > logs/test_output.log
        pytest -vv >> logs/test_output.log 2>&1 || true
        echo "===== TEST EXECUTION END =====" >> logs/test_output.log

    - name: Filter Logs
      run: |
        tail -n 200 logs/test_output.log > logs/filtered.log

    - name: Upload Logs
      uses: actions/upload-artifact@v3
      with:
        name: filtered-logs
        path: logs/filtered.log
