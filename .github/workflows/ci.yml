name: AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create logs folder
      run: mkdir -p logs

    - name: Run Tests (never fail pipeline)
      run: |
        pytest > logs/output.log 2>&1 || echo "pytest failed but continuing"

    - name: Show Logs (safe)
      run: |
        if [ -f logs/output.log ]; then
          cat logs/output.log
        else
          echo "No logs file found"
        fi

    - name: Run AI Analyzer (safe)
      run: |
        if [ -f scripts/analyze_logs.py ]; then
          python scripts/analyze_logs.py || echo "Analyzer failed but continuing"
        else
          echo "Analyzer script not found"
        fi

    - name: Upload Logs (safe)
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs/output.log
        if-no-files-found: warn
