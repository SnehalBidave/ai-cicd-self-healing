name: AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Tests and Capture Logs
      run: |
        mkdir -p logs
        pytest > logs/output.log 2>&1 || true

    - name: Show Logs
      run: cat logs/output.log || true

    - name: Run AI Analyzer (SAFE)
      run: |
        python scripts/analyze_logs.py || true

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: logs/output.log
